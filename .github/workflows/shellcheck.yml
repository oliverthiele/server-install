name: shellcheck

on:
  push:
    paths:
      - "**.sh"
      - ".shellcheckrc"
      - ".github/workflows/shellcheck.yml"
  pull_request:
    paths:
      - "**.sh"
      - ".shellcheckrc"
      - ".github/workflows/shellcheck.yml"

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          shellcheck install.sh lib/*.sh bin/*.sh